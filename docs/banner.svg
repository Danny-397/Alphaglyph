<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="AlphaGlyph — backtest a strategy, then find out if the edge is real">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1310"/>
      <stop offset="0.55" stop-color="#0c1b15"/>
      <stop offset="1" stop-color="#08120e"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2f8f5b"/>
      <stop offset="1" stop-color="#57e39a"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#57e39a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#57e39a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1c2f26" stroke-width="1" opacity="0.6">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- equity curve motif (right side) -->
  <g transform="translate(690,44)">
    <path d="M0,196 L40,182 L80,196 L120,150 L160,168 L200,120 L240,138 L280,86 L320,104 L360,58 L400,74 L440,34 L470,44 L470,236 L0,236 Z"
          fill="url(#fill)"/>
    <path d="M0,196 L40,182 L80,196 L120,150 L160,168 L200,120 L240,138 L280,86 L320,104 L360,58 L400,74 L440,34 L470,44"
          fill="none" stroke="url(#curve)" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="470" cy="44" r="5.5" fill="#57e39a"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(64,96)">
    <text x="0" y="0" font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif" font-size="60" font-weight="800" fill="#f2fbf6" letter-spacing="-1">
      <tspan fill="#57e39a">&#9672; </tspan>AlphaGlyph
    </text>
    <text x="3" y="46" font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#a9c4b8">
      Backtest a strategy — then find out if the edge is real.
    </text>
  </g>

  <!-- validation chips -->
  <g transform="translate(66,214)" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="15" font-weight="600">
    <g>
      <rect x="0" y="0" width="196" height="40" rx="20" fill="#0f241a" stroke="#2f8f5b" stroke-width="1.5"/>
      <text x="98" y="26" text-anchor="middle" fill="#8fe6b6">Monte Carlo</text>
    </g>
    <g transform="translate(212,0)">
      <rect x="0" y="0" width="230" height="40" rx="20" fill="#0f241a" stroke="#2f8f5b" stroke-width="1.5"/>
      <text x="115" y="26" text-anchor="middle" fill="#8fe6b6">Deflated Sharpe</text>
    </g>
    <g transform="translate(458,0)">
      <rect x="0" y="0" width="210" height="40" rx="20" fill="#0f241a" stroke="#2f8f5b" stroke-width="1.5"/>
      <text x="105" y="26" text-anchor="middle" fill="#8fe6b6">Fama-French &#945;</text>
    </g>
  </g>
</svg>
