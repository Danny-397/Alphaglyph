# Render deployment configuration
# Docs: https://render.com/docs/render-yaml-spec
#
# Deploy with one click: https://render.com/deploy
# Or push this file to GitHub and Render will detect it automatically.

services:
  - type: web
    name: alphaglyph-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    # gunicorn.conf.py is auto-discovered — sets workers=1, timeout=120,
    # threads=4, and binds to $PORT.

    # The API is fully stateless — no database and no persistent disk needed.
    # Every endpoint is a pure market computation; the bots run in the browser.
    # The app self-pings RENDER_EXTERNAL_URL (set automatically) to stay warm on
    # the free tier. No brokerage API keys are ever required.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"            # pandas/numpy/scipy ship wheels for 3.11;
                                   # newer Pythons force a slow source build that fails

      - key: TIINGO_API_KEY
        sync: false          # free key from https://www.tiingo.com — primary
                             # market-data source (yfinance/Stooq are unreliable
                             # from cloud IPs). Without it, backtests may fail
                             # to fetch data on Render.

      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after frontend deploy
                             # e.g. https://your-project.vercel.app

    healthCheckPath: /health
